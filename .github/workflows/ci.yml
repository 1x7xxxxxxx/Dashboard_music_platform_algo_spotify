name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    # Postgres service re-added 2026-06-13 — this time ACTUALLY PROVISIONED (init_db.sql
    # + migrations/*.sql, see "Provision Postgres" step), so the 39-view render-smoke and
    # the ML DB tests run in CI instead of skipping. The 2026-06-11 removal note was right
    # that an *unprovisioned* service added zero value; provisioning is the fix. The
    # provision step fails loudly if the core schema is absent (no silent test SKIP).
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres  # pragma: allowlist secret — throwaway CI DB
          POSTGRES_DB: spotify_etl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d spotify_etl"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install system dependencies (build tools for any wheel-less package)
        # Historical: libcairo2-dev was needed for pycairo (xhtml2pdf transitive).
        # Removed when PDF stack migrated to WeasyPrint (dashboard-only, not CI).
        # build-essential + pkg-config kept as a safety net for source builds.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config

      - name: Install dependencies from lockfile
        # --frozen: refuse to update uv.lock; CI must match what devs have locally.
        # --extra dev: include pytest, ruff, httpx, pytest-mock, pytest-cov.
        run: uv sync --frozen --extra dev

      - name: Manifest consistency (blocking)
        # Deterministic, sub-second, zero-network. Catches pin drift across
        # pyproject.toml / requirements.txt / uv.lock (error class
        # streamlit-pin-drift) before it ships a prod≠dev image.
        run: uv run python tools/dev/check_manifest_consistency.py

      - name: Lint (ruff) — full project (blocking)
        # Promoted from advisory to blocking on 2026-05-14 after baseline cleanup
        # (44 → 0 errors). Any regression now fails CI; revert to --exit-zero only
        # after explicit ADR.
        run: uv run ruff check src/ tests/

      - name: REX integrity + deterministic error-class guards (blocking)
        # Deterministic, no-DB, sub-second. validate_rex.py enforces the rex: schema
        # across every .claude/ tool; audit_runner.py runs each kind:deterministic
        # error-class signature catalogued in .claude/dev-docs/error-classes.md
        # (single source of truth — no hand-synced Makefile drift). Heuristic
        # classes run in security-nightly.yml (non-blocking, manual triage).
        # `uv run` puts the venv on PATH so the signatures' python3/pytest resolve.
        run: |
          uv run python .claude/scripts/validate_rex.py --strict
          uv run python .claude/scripts/audit_runner.py --deterministic

      - name: Provision Postgres (schema + migrations)
        env:
          PGPASSWORD: postgres  # pragma: allowlist secret — throwaway CI DB
        run: |
          sudo apt-get install -y --no-install-recommends postgresql-client
          # The postgres image runs a temp init server then restarts, so poll a real
          # query (twice) before applying DDL rather than trusting the first hit.
          for i in $(seq 1 30); do
            if psql -h localhost -U postgres -d spotify_etl -tAc "SELECT 1" >/dev/null 2>&1; then
              sleep 2
              psql -h localhost -U postgres -d spotify_etl -tAc "SELECT 1" >/dev/null 2>&1 && break
            fi
            sleep 2
          done
          psql -h localhost -U postgres -d spotify_etl -v ON_ERROR_STOP=0 -f init_db.sql
          for f in $(ls migrations/*.sql | sort); do
            psql -h localhost -U postgres -d spotify_etl -v ON_ERROR_STOP=0 -f "$f"
          done
          # Fail loudly if provisioning did not produce the core schema — otherwise the
          # DB-backed tests would silently SKIP and we'd lose the coverage we just added.
          psql -h localhost -U postgres -d spotify_etl -v ON_ERROR_STOP=1 \
            -c "SELECT 1 FROM saas_artists LIMIT 1"

      - name: Run tests
        env:
          # DATABASE_URL points the DB layer at the provisioned CI Postgres so the
          # 39-view render-smoke + ML DB tests run (they skip when it is absent).
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/spotify_etl  # pragma: allowlist secret
          # Dummy Airflow creds: src/dashboard/app.py raises at IMPORT when
          # AIRFLOW_PASSWORD is unset (anti unauthenticated-DAG-trigger guard).
          AIRFLOW_USERNAME: ci
          AIRFLOW_PASSWORD: ci-not-a-real-secret  # pragma: allowlist secret
        # --cov-report=xml: for codecov-style downstream tooling.
        # --cov-report=term-missing: visible in CI logs (line numbers of uncovered code).
        # No --cov-fail-under: measure first, gate later.
        run: uv run pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
          if-no-files-found: ignore
