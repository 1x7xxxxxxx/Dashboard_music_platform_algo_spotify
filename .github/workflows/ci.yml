name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    # No `services: postgres` on purpose (removed 2026-06-11). The CI Postgres was
    # never provisioned (init_db.sql / migrations never ran), so every DB-backed test
    # already SKIPS against it (see tests/test_views_render_smoke.py: it does a real
    # query and skips on an unprovisioned DB). The service therefore added ZERO test
    # value while introducing a Docker Hub image-pull dependency that flaked the whole
    # job on registry timeouts (e.g. run 27307850722 on 70c0b38). Removing it makes CI
    # deterministic; DB-backed tests skip cleanly, ruff + unit tests run as before.

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install system dependencies (build tools for any wheel-less package)
        # Historical: libcairo2-dev was needed for pycairo (xhtml2pdf transitive).
        # Removed when PDF stack migrated to WeasyPrint (dashboard-only, not CI).
        # build-essential + pkg-config kept as a safety net for source builds.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config

      - name: Install dependencies from lockfile
        # --frozen: refuse to update uv.lock; CI must match what devs have locally.
        # --extra dev: include pytest, ruff, httpx, pytest-mock, pytest-cov.
        run: uv sync --frozen --extra dev

      - name: Manifest consistency (blocking)
        # Deterministic, sub-second, zero-network. Catches pin drift across
        # pyproject.toml / requirements.txt / uv.lock (error class
        # streamlit-pin-drift) before it ships a prod≠dev image.
        run: uv run python tools/dev/check_manifest_consistency.py

      - name: Lint (ruff) — full project (blocking)
        # Promoted from advisory to blocking on 2026-05-14 after baseline cleanup
        # (44 → 0 errors). Any regression now fails CI; revert to --exit-zero only
        # after explicit ADR.
        run: uv run ruff check src/ tests/

      - name: Run tests
        env:
          # No DATABASE_URL: there is no CI Postgres (see note above). DB-backed tests
          # detect the unreachable socket on 5433 and skip; the rest run normally.
          # Dummy Airflow creds: src/dashboard/app.py raises at IMPORT when
          # AIRFLOW_PASSWORD is unset (anti unauthenticated-DAG-trigger guard).
          # No real Airflow is contacted by the suite — this only lets app.py
          # import (e.g. test_i18n reads app._NAV_SECTIONS).
          AIRFLOW_USERNAME: ci
          AIRFLOW_PASSWORD: ci-not-a-real-secret  # pragma: allowlist secret
        # --cov-report=xml: for codecov-style downstream tooling.
        # --cov-report=term-missing: visible in CI logs (line numbers of uncovered code).
        # No --cov-fail-under: measure first, gate later.
        run: uv run pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
          if-no-files-found: ignore
