name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spotify_etl
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff) — new code (blocking)
        run: ruff check src/api/ tests/test_api.py

      - name: Lint (ruff) — legacy code (advisory)
        run: ruff check src/ tests/ --exit-zero

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/spotify_etl
        run: pytest tests/ -v --tb=short

  deploy-railway:
    # Deploys the FastAPI service to Railway on push to main.
    # Requires RAILWAY_TOKEN secret set in GitHub repository settings.
    # Set up: https://docs.railway.com/guides/github-actions
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service api --detach
