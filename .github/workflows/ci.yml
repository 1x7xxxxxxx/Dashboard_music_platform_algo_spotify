name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spotify_etl
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (pycairo build deps via xhtml2pdf)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev \
            pkg-config

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff) — new code (blocking)
        run: ruff check src/api/ tests/test_api.py

      - name: Lint (ruff) — legacy code (advisory)
        run: ruff check src/ tests/ --exit-zero

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/spotify_etl
        run: pytest tests/ -v --tb=short

  deploy-railway:
    # Deploys the FastAPI service to Railway on push to main.
    # Requires RAILWAY_TOKEN secret set in GitHub repository settings.
    # Set up: https://docs.railway.com/guides/github-actions
    # Disabled 2026-05-11: RAILWAY_TOKEN secret is empty/expired. Re-enable
    # by removing `if: false` once a fresh token is added in
    # Settings -> Secrets and variables -> Actions -> RAILWAY_TOKEN.
    needs: lint-and-test
    if: false  # Remove this line once RAILWAY_TOKEN is configured
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service api --detach

  deploy-hetzner:
    # Auto-deploy to Hetzner VPS via SSH on push to main.
    # Activate when ready: remove the `if: false` line below.
    # Required GitHub secrets:
    #   HETZNER_HOST     — VPS IP or hostname (e.g. 65.21.x.x)
    #   HETZNER_USER     — SSH user (e.g. root or deploy)
    #   HETZNER_SSH_KEY  — private SSH key (generate: ssh-keygen -t ed25519)
    # VPS setup (one-time): add the public key to ~/.ssh/authorized_keys on the server.
    needs: lint-and-test
    if: false  # Remove this line once HETZNER_* secrets are configured
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key:      ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/music-dashboard
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec -T airflow-scheduler airflow dags unpause meta_ads_api_daily || true
            echo "Deploy done: $(date)"
