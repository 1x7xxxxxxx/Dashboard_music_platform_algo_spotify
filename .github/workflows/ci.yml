name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spotify_etl
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install system dependencies (build tools for any wheel-less package)
        # Historical: libcairo2-dev was needed for pycairo (xhtml2pdf transitive).
        # Removed when PDF stack migrated to WeasyPrint (dashboard-only, not CI).
        # build-essential + pkg-config kept as a safety net for source builds.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config

      - name: Install dependencies from lockfile
        # --frozen: refuse to update uv.lock; CI must match what devs have locally.
        # --extra dev: include pytest, ruff, httpx, pytest-mock, pytest-cov.
        run: uv sync --frozen --extra dev

      - name: Manifest consistency (blocking)
        # Deterministic, sub-second, zero-network. Catches pin drift across
        # pyproject.toml / requirements.txt / uv.lock (error class
        # streamlit-pin-drift) before it ships a prod≠dev image.
        run: uv run python tools/dev/check_manifest_consistency.py

      - name: Lint (ruff) — full project (blocking)
        # Promoted from advisory to blocking on 2026-05-14 after baseline cleanup
        # (44 → 0 errors). Any regression now fails CI; revert to --exit-zero only
        # after explicit ADR.
        run: uv run ruff check src/ tests/

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/spotify_etl
        # --cov-report=xml: for codecov-style downstream tooling.
        # --cov-report=term-missing: visible in CI logs (line numbers of uncovered code).
        # No --cov-fail-under: measure first, gate later.
        run: uv run pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
          if-no-files-found: ignore
