name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spotify_etl
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install system dependencies (pycairo build deps via xhtml2pdf)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev \
            pkg-config

      - name: Install dependencies from lockfile
        # --frozen: refuse to update uv.lock; CI must match what devs have locally.
        # --extra dev: include pytest, ruff, httpx, pytest-mock, pytest-cov.
        run: uv sync --frozen --extra dev

      - name: Lint (ruff) — new code (blocking)
        run: uv run ruff check src/api/ tests/test_api.py

      - name: Lint (ruff) — legacy code (advisory)
        run: uv run ruff check src/ tests/ --exit-zero

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/spotify_etl
        run: uv run pytest tests/ -v --tb=short
