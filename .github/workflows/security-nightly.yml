name: Security — Nightly audit

# Nightly security pass on main (observational — NOT a deploy gate):
#   - pip-audit:         Python deps vs PyPI Advisory DB
#   - error-class-audit: heuristic grep sweep (.claude/dev-docs/error-classes.md)
#   - gitleaks:          full git history secret scan
#
# By design every job is NON-BLOCKING: findings are surfaced in the run's
# Job Summary, the workflow stays green, and no nightly red email is sent.
# This matches the original intent ("observational, no deploy gate") which
# the previous hard-fail implementation contradicted.
#
# Pre-prod hardening backlog (re-enable blocking selectively before going live):
#   - pip-audit:  pin apache-airflow-core to the Docker image version, then
#                 restore `--strict` so real CVEs block.
#   - gitleaks:   triage the ~27 historical findings (true secrets vs FPs like
#                 the 1x7xxxxxxx filter / config.example.yaml), add a
#                 .gitleaks.toml allowlist or rotate + baseline, then block.
#   - error-class-audit: stays heuristic/non-blocking (known FPs, e.g.
#                 cosmetic datetime.now() allowed by .claude/rules/python.md).

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    continue-on-error: true   # observational — never fail the workflow
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies (report to summary)
        run: |
          pip-audit -r requirements.txt --desc on --format markdown \
            -o pip-audit.md || true
          {
            echo "## pip-audit (non-blocking)"
            echo
            cat pip-audit.md 2>/dev/null || echo "_pip-audit produced no report._"
          } >> "$GITHUB_STEP_SUMMARY"

  error-class-audit:
    # Heuristic sweep of the catalogue's automatable signatures
    # (.claude/dev-docs/error-classes.md). Known false positives (e.g.
    # cosmetic datetime.now()) — triage hits manually, never a gate.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Run error-class audit (report to summary)
        run: |
          {
            echo "## error-class audit (heuristic, non-blocking)"
            echo
            echo '```'
            make audit 2>&1 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  gitleaks:
    runs-on: ubuntu-latest
    continue-on-error: true   # historical leaks triaged pre-prod, not here
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # gitleaks needs full history to scan all commits

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks-action writes its own Job Summary + SARIF artifact.
