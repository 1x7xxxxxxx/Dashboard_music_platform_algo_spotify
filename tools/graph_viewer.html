<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>streaMLytics — graphify viewer</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #cy { position: absolute; top: 56px; left: 0; right: 320px; bottom: 0; background: #fafafa; }
  #sidebar {
    position: absolute; top: 56px; right: 0; bottom: 0; width: 320px;
    border-left: 1px solid #ddd; padding: 12px 16px; overflow-y: auto;
    background: #fff; font-size: 13px;
  }
  #toolbar {
    position: absolute; top: 0; left: 0; right: 0; height: 56px;
    border-bottom: 1px solid #ddd; padding: 8px 16px;
    display: flex; align-items: center; gap: 12px; background: #fff;
  }
  #toolbar input { padding: 6px 10px; font-size: 13px; width: 240px; border: 1px solid #ccc; border-radius: 4px; }
  #toolbar select, #toolbar button {
    padding: 6px 10px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px;
    background: #fff; cursor: pointer;
  }
  #toolbar button:hover { background: #f5f5f5; }
  .stat { color: #666; font-size: 12px; }
  #sidebar h3 { margin: 4px 0 8px; font-size: 14px; }
  #sidebar .field { margin: 6px 0; }
  #sidebar .field label { color: #888; font-size: 11px; text-transform: uppercase; }
  #sidebar .field .value { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; word-break: break-all; }
  #sidebar .neighbors li { font-size: 12px; padding: 2px 0; cursor: pointer; font-family: ui-monospace, monospace; }
  #sidebar .neighbors li:hover { color: #1d6fd6; text-decoration: underline; }
  .placeholder { color: #999; font-style: italic; }
</style>
<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
<script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
</head>
<body>

<div id="toolbar">
  <strong>streaMLytics graph</strong>
  <input id="search" type="text" placeholder="Filter by label (regex)…" />
  <select id="layout-select">
    <option value="fcose">fcose (force-directed)</option>
    <option value="cose">cose</option>
    <option value="circle">circle</option>
    <option value="concentric">concentric</option>
    <option value="grid">grid</option>
    <option value="breadthfirst">breadthfirst</option>
  </select>
  <button id="fit-btn">Fit to view</button>
  <span class="stat" id="stats">loading…</span>
</div>

<div id="cy"></div>

<div id="sidebar">
  <h3>Selected node</h3>
  <div id="node-info"><p class="placeholder">Click a node to inspect.</p></div>
</div>

<script>
const GRAPH_URL = "../graphify-out/graph.json";

// Community palette — D3 category20-ish, will cycle if there are more communities
const PALETTE = [
  "#1f77b4","#ff7f0e","#2ca02c","#d62728","#9467bd","#8c564b","#e377c2","#7f7f7f","#bcbd22","#17becf",
  "#aec7e8","#ffbb78","#98df8a","#ff9896","#c5b0d5","#c49c94","#f7b6d2","#c7c7c7","#dbdb8d","#9edae5"
];
function colorFor(community) { return PALETTE[(community || 0) % PALETTE.length]; }

async function load() {
  let raw;
  try {
    const resp = await fetch(GRAPH_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    raw = await resp.json();
  } catch (err) {
    document.getElementById("stats").innerHTML =
      `<span style="color:#c00;">Failed to load ${GRAPH_URL} — ${err.message}.
       Serve from repo root: <code>python3 -m http.server</code>, then open
       <code>http://localhost:8000/tools/graph_viewer.html</code></span>`;
    return;
  }

  const elements = [];
  for (const n of raw.nodes) {
    elements.push({
      data: {
        id: n.id,
        label: n.label || n.id,
        file_type: n.file_type,
        source_file: n.source_file,
        source_location: n.source_location,
        community: n.community,
        norm_label: n.norm_label,
      },
      style: {
        "background-color": colorFor(n.community),
      },
    });
  }
  for (const e of raw.links) {
    elements.push({
      data: {
        id: `${e.source}__${e.target}__${e.relation}`,
        source: e.source,
        target: e.target,
        relation: e.relation,
        confidence: e.confidence,
        weight: e.weight,
      },
    });
  }

  const cy = cytoscape({
    container: document.getElementById("cy"),
    elements,
    style: [
      {
        selector: "node",
        style: {
          "label": "data(label)",
          "font-size": 8,
          "text-valign": "center",
          "text-halign": "right",
          "text-margin-x": 3,
          "color": "#222",
          "width": 12,
          "height": 12,
          "border-width": 0,
          "min-zoomed-font-size": 5,
        },
      },
      {
        selector: "edge",
        style: {
          "width": 0.6,
          "line-color": "#ccc",
          "curve-style": "haystack",
          "haystack-radius": 0.3,
          "opacity": 0.6,
        },
      },
      {
        selector: "edge[confidence = 'INFERRED']",
        style: { "line-style": "dashed", "opacity": 0.35 },
      },
      {
        selector: ":selected",
        style: {
          "border-width": 3,
          "border-color": "#1d6fd6",
          "z-index": 999,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.07 },
      },
      {
        selector: ".highlight",
        style: { "border-width": 2, "border-color": "#d62728" },
      },
    ],
    layout: { name: "fcose", animate: false, randomize: true, nodeRepulsion: 8000, idealEdgeLength: 60 },
    wheelSensitivity: 0.2,
    minZoom: 0.05,
    maxZoom: 4,
  });

  // Sidebar update on node tap
  cy.on("tap", "node", (evt) => {
    const n = evt.target;
    const d = n.data();
    const neighbors = n.neighborhood("node").map((nn) => nn.data());
    const html = `
      <div class="field"><label>Label</label><div class="value">${escapeHtml(d.label || "")}</div></div>
      <div class="field"><label>ID</label><div class="value">${escapeHtml(d.id)}</div></div>
      <div class="field"><label>Source file</label><div class="value">${escapeHtml(d.source_file || "")}</div></div>
      <div class="field"><label>Location</label><div class="value">${escapeHtml(d.source_location || "")}</div></div>
      <div class="field"><label>File type</label><div class="value">${escapeHtml(d.file_type || "")}</div></div>
      <div class="field"><label>Community</label><div class="value">${d.community ?? ""}</div></div>
      <div class="field"><label>Degree</label><div class="value">${n.degree()}</div></div>
      <div class="field"><label>Neighbors (${neighbors.length})</label>
        <ul class="neighbors" style="padding-left: 16px; margin: 4px 0;">
          ${neighbors.slice(0, 30).map((nb) => `<li data-nid="${escapeHtml(nb.id)}">${escapeHtml(nb.label)}</li>`).join("")}
          ${neighbors.length > 30 ? `<li style="color:#999;font-style:italic">…+${neighbors.length - 30} more</li>` : ""}
        </ul>
      </div>
    `;
    const info = document.getElementById("node-info");
    info.innerHTML = html;
    info.querySelectorAll("li[data-nid]").forEach((li) => {
      li.addEventListener("click", () => {
        const target = cy.getElementById(li.dataset.nid);
        if (target.nonempty()) {
          cy.elements().unselect();
          target.select();
          cy.animate({ center: { eles: target }, zoom: 1.4 }, { duration: 400 });
          target.emit("tap");
        }
      });
    });
  });

  cy.on("tap", (evt) => {
    if (evt.target === cy) {
      document.getElementById("node-info").innerHTML =
        '<p class="placeholder">Click a node to inspect.</p>';
    }
  });

  // Search filter (regex on label)
  const search = document.getElementById("search");
  search.addEventListener("input", () => {
    const q = search.value.trim();
    if (!q) {
      cy.elements().removeClass("dim").removeClass("highlight");
      return;
    }
    let re;
    try { re = new RegExp(q, "i"); } catch { return; }
    const matched = cy.nodes().filter((n) => re.test(n.data("label") || ""));
    cy.elements().addClass("dim");
    matched.removeClass("dim").addClass("highlight");
    matched.connectedEdges().removeClass("dim");
    matched.neighborhood("node").removeClass("dim");
  });

  // Layout switcher
  document.getElementById("layout-select").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: true, randomize: true }).run();
  });

  document.getElementById("fit-btn").addEventListener("click", () => cy.fit(null, 30));

  // Stats
  const communities = new Set(raw.nodes.map((n) => n.community));
  document.getElementById("stats").textContent =
    `${raw.nodes.length} nodes · ${raw.links.length} edges · ${communities.size} communities`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
  );
}

load();
</script>
</body>
</html>
