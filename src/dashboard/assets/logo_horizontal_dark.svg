<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 120" width="470" height="120" role="img" aria-label="streaMLytics">
  <defs>
    <linearGradient id="gd" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#1DB954"/>
      <stop offset="1" stop-color="#1ED760"/>
    </linearGradient>
  </defs>
  <!-- mark -->
  <rect x="2" y="2" width="116" height="116" rx="26" fill="#191414"/>
  <g fill="url(#gd)">
    <rect x="20" y="70" width="13" height="32" rx="5"/>
    <rect x="39" y="54" width="13" height="48" rx="5"/>
    <rect x="58" y="62" width="13" height="40" rx="5"/>
    <rect x="77" y="34" width="13" height="68" rx="5"/>
  </g>
  <polyline points="26,70 45,54 64,62 83,34 100,24" fill="none"
            stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="100" cy="24" r="6" fill="#FFFFFF"/>
  <circle cx="100" cy="24" r="3" fill="#1DB954"/>
  <!-- wordmark (dark text for light backgrounds) -->
  <text x="140" y="74" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="46" font-weight="800" letter-spacing="-1">
    <tspan fill="#191414">strea</tspan><tspan fill="#1DB954">ML</tspan><tspan fill="#191414">ytics</tspan>
  </text>
  <text x="142" y="98" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="14" letter-spacing="4" fill="#5b7766">MUSIC ANALYTICS</text>
</svg>
